name: Coalesce Catalog to Snowflake Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Treat all tags as NEW (ignore sync history)'
        required: false
        type: boolean
        default: false
      table_limit:
        description: 'Limit tables (for testing only, leave empty for all)'
        required: false
        type: string
        default: ''
      table_ids:
        description: 'Specific table IDs (comma-separated, leave empty for all)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.10'

jobs:
  sync-tags:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Create output directories
      run: |
        mkdir -p data sql reports logs

    # Download previous run data from artifacts (if exists)
    - name: Download previous run data
      id: download_previous
      uses: dawidd6/action-download-artifact@v6
      with:
        name: catalog-data
        path: data/
        workflow: sync-catalog.yml
        workflow_conclusion: success
        if_no_artifact_found: warn
        search_artifacts: true

    - name: Build and run sync command
      env:
        COALESCE_API_TOKEN: ${{ secrets.COALESCE_API_TOKEN }}
        COALESCE_ZONE: ${{ vars.COALESCE_ZONE || 'US' }}
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        INPUT_FORCE_ALL: ${{ github.event.inputs.force_all }}
        INPUT_TABLE_IDS: ${{ github.event.inputs.table_ids }}
        INPUT_TABLE_LIMIT: ${{ github.event.inputs.table_limit }}
      run: |
        CMD="python main.py"

        # Add flags based on inputs
        if [ -n "$INPUT_TABLE_IDS" ]; then
          echo "Processing specific tables: $INPUT_TABLE_IDS"
          CMD="$CMD --table-ids ${INPUT_TABLE_IDS//,/ }"
        elif [ -n "$INPUT_TABLE_LIMIT" ]; then
          echo "Processing limited tables: $INPUT_TABLE_LIMIT"
          CMD="$CMD --limit $INPUT_TABLE_LIMIT"
        else
          echo "Processing all tables"
        fi

        if [ "$INPUT_FORCE_ALL" = "true" ]; then
          echo "Force mode: treating all tags as NEW"
          CMD="$CMD --force-all"
        fi

        echo "Executing: $CMD"
        $CMD

    # Upload current run data as artifact for next run comparison
    - name: Upload catalog data for next run
      uses: actions/upload-artifact@v4
      with:
        name: catalog-data
        path: data/catalog_tables_columns_*.json
        retention-days: 30

    # Upload SQL files as artifacts
    - name: Upload SQL files
      uses: actions/upload-artifact@v4
      with:
        name: sql-files-${{ github.run_number }}
        path: |
          sql/*.sql
        retention-days: 30

    # Upload reports as artifacts
    - name: Upload reports
      uses: actions/upload-artifact@v4
      with:
        name: reports-${{ github.run_number }}
        path: |
          reports/*.txt
        retention-days: 30

    # Generate run summary
    - name: Generate run summary
      run: |
        # Determine run type
        if [ "${{ github.event_name }}" == "schedule" ]; then
          echo "## 🕒 Scheduled Sync Complete" >> $GITHUB_STEP_SUMMARY
        else
          echo "## ✅ Manual Sync Complete" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        # Show configuration for manual runs
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY

          # Show configuration
          if [ -n "${{ github.event.inputs.table_ids }}" ]; then
            echo "- **Table IDs:** ${{ github.event.inputs.table_ids }}" >> $GITHUB_STEP_SUMMARY
          elif [ -n "${{ github.event.inputs.table_limit }}" ]; then
            echo "- **Table limit:** ${{ github.event.inputs.table_limit }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Mode:** All tables" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            echo "- **Force all:** Yes (treating all tags as NEW)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        # Get metrics from report
        REPORT_FILE=$(ls -t reports/sync_report_*.txt 2>/dev/null | head -1)
        if [ -f "$REPORT_FILE" ]; then
          echo "### 📊 Results" >> $GITHUB_STEP_SUMMARY

          # Extract key metrics
          TABLES=$(grep "Tables found:" "$REPORT_FILE" | cut -d: -f2 | xargs)
          TAGGED=$(grep "Tables with tagged columns:" "$REPORT_FILE" | cut -d: -f2 | xargs)
          SQL_COUNT=$(grep "SQL statements generated:" "$REPORT_FILE" | cut -d: -f2 | xargs || echo "0")
          DROP_COUNT=$(grep "DROP TAG statements generated:" "$REPORT_FILE" | cut -d: -f2 | xargs || echo "0")

          echo "- **Tables processed:** $TABLES" >> $GITHUB_STEP_SUMMARY
          echo "- **Tables with tags:** $TAGGED" >> $GITHUB_STEP_SUMMARY
          echo "- **SQL statements generated:** $SQL_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **DROP TAG statements generated:** $DROP_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        # Show artifacts
        echo "### 📥 Downloads" >> $GITHUB_STEP_SUMMARY
        echo "Download the artifacts from the Summary section below:" >> $GITHUB_STEP_SUMMARY
        echo "- **sql-files-${{ github.run_number }}** - SQL ALTER and DROP statements" >> $GITHUB_STEP_SUMMARY
        echo "- **reports-${{ github.run_number }}** - Synchronization report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "1. Download the SQL files from artifacts" >> $GITHUB_STEP_SUMMARY
        echo "2. Review the generated SQL statements" >> $GITHUB_STEP_SUMMARY
        echo "3. Execute in your Snowflake environment" >> $GITHUB_STEP_SUMMARY

